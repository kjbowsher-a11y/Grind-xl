<!DOCTYPE html>
<html>
<head>
  <title>GRIND XL App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      background: #00ff88;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      background: #1a1a1a;
    }

    .tab {
      padding: 12px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .tab.active {
      background: #00ff88;
      color: black;
      font-weight: bold;
    }

    .page {
      display: none;
      padding: 15px;
    }

    .page.active {
      display: block;
    }

    .card {
      background: #1f1f1f;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
    }

    label {
      display: block;
      margin: 10px 0;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 8px;
    }

    .quote {
      color: #aaa;
      font-style: italic;
      margin-top: 10px;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>⚽ GRIND XL ATHLETE APP</header>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Train</div>
  <div class="tab" onclick="showTab(1)">Nutrition</div>
  <div class="tab" onclick="showTab(2)">Mindset</div>
</div>

<!-- TRAIN PAGE -->
<div class="page active">
  <div class="card">
    <h3>🏋️ Daily Training</h3>

    <label><input type="checkbox" class="save"> Soccer training</label>
    <label><input type="checkbox" class="save"> Strength workout</label>
    <label><input type="checkbox" class="save"> Speed & agility</label>
    <label><input type="checkbox" class="save"> Ball touches (15–30 min)</label>

    <button onclick="reset()">Reset Day</button>
  </div>
</div>

<!-- NUTRITION PAGE -->
<div class="page">
  <div class="card">
    <h3>💊 Nutrition Goals</h3>

    <label><input type="checkbox" class="save"> 5g Creatine</label>
    <label><input type="checkbox" class="save"> 100–140g Protein</label>
    <label><input type="checkbox" class="save"> 2–3L Water</label>
  </div>
</div>

<!-- MINDSET PAGE -->
<div class="page">
  <div class="card">
    <h3>🧠 Mindset</h3>

    <p class="quote">“Discipline beats motivation when motivation fades.”</p>
    <p>Colossians 3:23 — Work with all your heart.</p>

    <div class="card">
      <h3>🔥 Streak</h3>
      <p id="streak">0 days</p>
      <button onclick="addStreak()">Log Training Day</button>
    </div>
  </div>
</div>

<script>
  const tabs = document.querySelectorAll(".tab");
  const pages = document.querySelectorAll(".page");

  function showTab(i) {
    tabs.forEach(t => t.classList.remove("active"));
    pages.forEach(p => p.classList.remove("active"));

    tabs[i].classList.add("active");
    pages[i].classList.add("active");
  }

  // Save checkboxes
  const boxes = document.querySelectorAll(".save");

  boxes.forEach((box, i) => {
    box.checked = localStorage.getItem("gxl_" + i) === "true";

    box.addEventListener("change", () => {
      localStorage.setItem("gxl_" + i, box.checked);
    });
  });

  function reset() {
    boxes.forEach((box, i) => {
      box.checked = false;
      localStorage.setItem("gxl_" + i, "false");
    });
  }

  // Streak system
  let streak = localStorage.getItem("streak") || 0;
  document.getElementById("streak").innerText = streak + " days";

  function addStreak() {
    streak++;
    localStorage.setItem("streak", streak);
    document.getElementById("streak").innerText = streak + " days";
  }
</script>

</body>
</html>
